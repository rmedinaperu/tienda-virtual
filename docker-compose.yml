version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: store_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: store_production
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: store_web
    restart: always
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_ASSUME_SSL: ${RAILS_ASSUME_SSL}
      RAILS_FORCE_SSL: ${RAILS_FORCE_SSL}
      DATABASE_URL: mysql2://root:password@db/store_production

      DATABASE_HOST: db
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: password
    depends_on:
      - db
    # Thruster runs on port 80 by default. Nginx will proxy to web:80
    expose:
      - "80"
    # To run DB migrations on startup automatically:
    # command: bash -c "bin/rails db:prepare && ./bin/thrust ./bin/rails server"

  nginx:
    image: nginx:alpine
    container_name: store_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  db_data:
